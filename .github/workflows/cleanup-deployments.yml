name: Cleanup Old Deployments

on:
  schedule:
    # Runs every day at 2:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch: # Allows manual execution

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Cleanup old deployments
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          # Get list of all deployments (excluding production)
          deployments=$(vercel ls --token $VERCEL_TOKEN --scope $VERCEL_ORG_ID | grep -v "production" | tail -n +2 | head -n -5 | awk '{print $1}')

          # Delete old deployments (keep last 5)
          for deployment in $deployments; do
            echo "Deleting deployment: $deployment"
            vercel rm $deployment --token $VERCEL_TOKEN --scope $VERCEL_ORG_ID --yes
          done
